<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.calculator{
    background: #222;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.display{
    width: 100%;
    height: 50px;
    margin-bottom: 10px;
    text-align: right;
    font-size: 24px;
    padding: 5px;
    border: none;
    border-radius: 5px;
}

.buttons{
    display: grid;
    grid-template-columns: repeat(4, 60px);
    gap: 10px;
}

button{
    height: 50px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

/* Number buttons */
.number{
    background: #444;
    color: white;
}

.number:hover{
    background: #666;
}

/* Operator buttons */
.operator{
    background: orange;
    color: white;
}

.operator:hover{
    background: darkorange;
}

/* Equal button */
.equal{
    background: green;
    color: white;
}

.equal:hover{
    background: darkgreen;
}

/* Clear button */
.clear{
    background: red;
    color: white;
}

.clear:hover{
    background: darkred;
}
</style>

</head>

<body>

<div class="calculator">
<input type="text" class="display" id="display" readonly>

<div class="buttons">
<button class="number" onclick="append('7')">7</button>
<button class="number" onclick="append('8')">8</button>
<button class="number" onclick="append('9')">9</button>
<button class="operator" onclick="append('/')">/</button>

<button class="number" onclick="append('4')">4</button>
<button class="number" onclick="append('5')">5</button>
<button class="number" onclick="append('6')">6</button>
<button class="operator" onclick="append('*')">*</button>

<button class="number" onclick="append('1')">1</button>
<button class="number" onclick="append('2')">2</button>
<button class="number" onclick="append('3')">3</button>
<button class="operator" onclick="append('-')">-</button>

<button class="number" onclick="append('0')">0</button>
<button class="clear" onclick="clearDisplay()">C</button>
<button class="equal" onclick="calculate()">=</button>
<button class="operator" onclick="append('+')">+</button>
</div>

</div>

<script>
function append(value){
document.getElementById("display").value += value;
}

function clearDisplay(){
document.getElementById("display").value = "";
}

function calculate(){
try{
document.getElementById("display").value = eval(document.getElementById("display").value);
}
catch{
alert("Invalid Expression");
}
}
</script>

</body>
</html>
