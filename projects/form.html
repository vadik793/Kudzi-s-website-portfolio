<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<style>
body{
font-family: Arial, sans-serif;
background-color:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.2);
width:300px;
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0056b3;
}

#message{
text-align:center;
margin-top:10px;
color:green;
font-weight:bold;
}
</style>

</head>
<body>

<div class="container">
<h2>Registration Form</h2>

<form onsubmit="registerUser(event)">
<input type="text" placeholder="Enter Name" id="name" required>

<input type="text" placeholder="Enter Surname" id="surname" required>

<input type="text" placeholder="Enter Registration Number" id="regno" required>

<button type="submit">Register</button>

</form>

<p id="message"></p>

</div>

<script>
function registerUser(event){
event.preventDefault();

document.getElementById("message").innerHTML = "Registered Successfully ✅";
}
</script>

</body>
</html>
